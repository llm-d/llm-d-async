\* Careless reorder: flow.Shutdown() can stop the retry worker before workers
\* finish draining -> a worker wedges forever on its bare retry send (and backlog
\* is lost). Expected: NoStuckWorker (and AllBacklogFlushed) VIOLATED.
CONSTANTS
    Workers = {w1, w2}
    Backlog = 2
    SafeOrdering = FALSE
SPECIFICATION Spec
INVARIANT TypeOK
PROPERTY NoStuckWorker
PROPERTY AllBacklogFlushed
PROPERTY CleanShutdown
